version: '3.8'

services:
  # The FastAPI Backend
  backend_api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile  # You need a Dockerfile in backend/
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./backend/database:/app/backend/database

  # The Streamlit Frontend
  frontend_ui:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile # You need a Dockerfile in frontend/
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend_api:8000/ask
    depends_on:
      - backend_api